name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-linux:
    name: Build Linux (AppImage + deb)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python deps
        run: pip install -r backend/requirements.txt pyinstaller

      - name: Install Node deps
        run: npm install

      - name: Build app
        run: npm run dist:linux

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: unipath-linux
          path: dist-setup/*

  build-windows:
    name: Build Windows (NSIS + Inno Setup installer)
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Inno Setup
        shell: pwsh
        run: |
          choco install innosetup -y --no-progress

      - name: Install Python deps
        run: pip install -r backend/requirements.txt pyinstaller

      - name: Install Node deps
        run: npm install

      - name: Download VC++ Redistributable
        shell: pwsh
        run: |
          mkdir installer\redist -Force
          Invoke-WebRequest -Uri "https://aka.ms/vs/17/release/vc_redist.x64.exe" -OutFile "installer\redist\vc_redist.x64.exe" -UseBasicParsing

      - name: Build app + custom installer
        run: npm run dist:installer

      - name: Upload electron-builder artifacts
        uses: actions/upload-artifact@v4
        with:
          name: unipath-windows-electron
          path: dist-setup/*

      - name: Upload custom Inno Setup installer
        uses: actions/upload-artifact@v4
        with:
          name: unipath-windows-installer
          path: dist-installer/*.exe

  build-macos:
    name: Build macOS (DMG)
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python deps
        run: pip install -r backend/requirements.txt pyinstaller

      - name: Install Node deps
        run: npm install

      - name: Build app
        run: npm run dist:mac

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: unipath-macos
          path: dist-setup/*

  release:
    name: Create GitHub Release
    needs: [build-linux, build-windows, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: UniPath ${{ github.ref_name }}
          body: |
            ## UniPath ${{ github.ref_name }}

            ### Downloads
            - **Linux**: Download the `.AppImage` or `.deb` from the `unipath-linux` artifact below
            - **Windows**:
              - **Recommended**: `UniPath-Setup-*.exe` (smart installer - handles everything automatically)
              - **Alternative**: `UniPath Setup *.exe` (standard electron-builder NSIS installer)
            - **macOS**: Download the `.dmg` from the `unipath-macos` artifact below

            ### No dependencies needed!
            Just download the installer for your OS and run it.
            The Windows installer auto-installs VC++ Redistributables if missing,
            sets up the backend, adds a firewall rule, and launches the app.

            ### What's New
            See the commit log for details.
          files: |
            unipath-linux/*
            unipath-windows-electron/*
            unipath-windows-installer/*
            unipath-macos/*
