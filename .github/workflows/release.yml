name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-linux:
    name: Build Linux (AppImage + deb)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python deps
        run: pip3 install -r backend/requirements.txt pyinstaller

      - name: Install Node deps
        run: npm install --legacy-peer-deps

      - name: Build frontend
        run: npm run build

      - name: Build backend (PyInstaller)
        run: python3 scripts/build_backend.py

      - name: Package with electron-builder
        run: npx electron-builder --linux --publish=never

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: unipath-linux
          path: dist-setup/*

  build-windows:
    name: Build Windows
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python deps
        run: pip install -r backend/requirements.txt pyinstaller

      - name: Install Node deps
        run: npm install --legacy-peer-deps

      - name: Build frontend
        run: npm run build

      - name: Build backend (PyInstaller)
        run: python scripts/build_backend.py

      - name: Package with electron-builder
        run: npx electron-builder --win --publish=never

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --no-progress -y

      - name: Download VC++ Redistributable
        shell: pwsh
        run: |
          mkdir installer\redist -Force -ErrorAction SilentlyContinue
          Invoke-WebRequest -Uri "https://aka.ms/vs/17/release/vc_redist.x64.exe" -OutFile "installer\redist\vc_redist.x64.exe" -UseBasicParsing

      - name: Compile Inno Setup installer
        shell: cmd
        run: installer\build-installer.bat

      - name: Upload electron-builder output
        uses: actions/upload-artifact@v4
        with:
          name: unipath-windows-electron
          path: dist-setup/*

      - name: Upload custom installer
        uses: actions/upload-artifact@v4
        with:
          name: unipath-windows-installer
          path: dist-installer/*.exe

  build-macos:
    name: Build macOS (DMG)
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python deps
        run: pip install -r backend/requirements.txt pyinstaller

      - name: Install Node deps
        run: npm install --legacy-peer-deps

      - name: Build frontend
        run: npm run build

      - name: Build backend (PyInstaller)
        run: python scripts/build_backend.py

      - name: Package with electron-builder
        run: npx electron-builder --mac --publish=never

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: unipath-macos
          path: dist-setup/*

  release:
    name: Create GitHub Release
    needs: [build-linux, build-windows, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: UniPath ${{ github.ref_name }}
          body: |
            ## UniPath ${{ github.ref_name }}

            ### Downloads

            **Windows**
            - `UniPath-Setup-*.exe` — One-click installer (recommended). Handles everything automatically.
            - `UniPath Setup *.exe` — Standard NSIS installer.

            **macOS**
            - `UniPath-*.dmg` — Drag to Applications folder.

            **Linux**
            - `UniPath-*.AppImage` — Make executable and run.
            - `UniPath-*.deb` — Debian/Ubuntu package.

            ### No dependencies needed
            Just download and run.
          files: |
            unipath-linux/*
            unipath-windows-electron/*
            unipath-windows-installer/*
            unipath-macos/*
