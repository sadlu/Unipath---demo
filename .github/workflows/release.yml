name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-linux:
    name: Build Linux (AppImage + deb)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python deps
        run: pip install -r backend/requirements.txt pyinstaller

      - name: Install Node deps
        run: npm install

      - name: Build app
        run: npm run dist:linux

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: unipath-linux
          path: dist-setup/*

  build-windows:
    name: Build Windows (NSIS installer)
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python deps
        run: pip install -r backend/requirements.txt pyinstaller

      - name: Install Node deps
        run: npm install

      - name: Build app
        run: npm run dist:win

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: unipath-windows
          path: dist-setup/*

  build-macos:
    name: Build macOS (DMG)
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python deps
        run: pip install -r backend/requirements.txt pyinstaller

      - name: Install Node deps
        run: npm install

      - name: Build app
        run: npm run dist:mac

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: unipath-macos
          path: dist-setup/*

  release:
    name: Create GitHub Release
    needs: [build-linux, build-windows, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: UniPath ${{ github.ref_name }}
          body: |
            ## UniPath ${{ github.ref_name }}

            ### Downloads
            - **Linux**: Download the `.AppImage` or `.deb` from the `unipath-linux` artifact below
            - **Windows**: Download the `.exe` installer from the `unipath-windows` artifact below
            - **macOS**: Download the `.dmg` from the `unipath-macos` artifact below

            ### No dependencies needed!
            Just download the installer for your OS and run it.

            ### What's New
            See the commit log for details.
          files: |
            unipath-linux/*
            unipath-windows/*
            unipath-macos/*
