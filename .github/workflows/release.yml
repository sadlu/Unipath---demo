name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: |
          pip install -r backend/requirements.txt pyinstaller
          npm install --legacy-peer-deps

      - name: Build
        run: npm run build && python3 scripts/build_backend.py && npx electron-builder --linux --publish=never

      - uses: actions/upload-artifact@v4
        with:
          name: unipath-linux
          path: dist-setup/*

  build-windows:
    name: Build Windows
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: |
          pip install -r backend/requirements.txt pyinstaller
          npm install --legacy-peer-deps

      - name: Build frontend
        run: npm run build

      - name: Build backend
        run: python scripts/build_backend.py

      - name: Package with electron-builder
        run: npx electron-builder --win --publish=never

      - uses: actions/upload-artifact@v4
        with:
          name: unipath-windows
          path: dist-setup/*.exe

  build-macos:
    name: Build macOS
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: |
          pip install -r backend/requirements.txt pyinstaller
          npm install --legacy-peer-deps

      - name: Build
        run: npm run build && python3 scripts/build_backend.py && npx electron-builder --mac --publish=never

      - uses: actions/upload-artifact@v4
        with:
          name: unipath-macos
          path: dist-setup/*

  release:
    name: Create GitHub Release
    needs: [build-linux, build-windows, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: UniPath ${{ github.ref_name }}
          body: |
            ## UniPath ${{ github.ref_name }}

            ### Download for your platform

            | Platform | File | Size |
            |----------|------|------|
            | **Windows** | `UniPath.Setup.*.exe` | ~180 MB |
            | **macOS** | `UniPath-*.dmg` | ~200 MB |
            | **Linux** | `UniPath-*.AppImage` | ~200 MB |

            No dependencies needed. Just download and run.
          files: |
            unipath-linux/*
            unipath-windows/*
            unipath-macos/*
