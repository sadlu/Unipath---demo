app = "unipath-app"

[build]
  dockerfile = "Dockerfile"

[env]
  UNIPATH_DATA_DIR = "/data"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[mounts]]
  source = "unipath_data"
  destination = "/data"
